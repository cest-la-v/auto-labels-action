version: v1

checks:
  - context: 'Semantic Pull Request'
    url: 'https://github.com/cest-la-v/auto-labels-action/blob/main/.github/labels.yml'
    description:
      success: Ready for review & merge.
      failure: Missing semantic label for merge.
    labels:
      any:
        - feat
        - fix
        - chore
        - docs
