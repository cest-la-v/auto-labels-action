version: v1

labels:
  - label: 'feat'
    include:
      title: '^feat:.*'

  - label: 'fix'
    include:
      title: '^fix:.*'

  - label: 'chore'
    include:
      title: '^chore:.*'

  - label: 'docs'
    include:
      title: '^docs:.*'

checks:
  - context: 'Semantic Pull Request'
    url: 'https://github.com/fuxingloh/multi-labeler/blob/main/.github/labels.yml'
    description:
      success: Ready for review & merge.
      failure: Missing semantic label for merge.
    labels:
      any:
        - feat
        - fix
        - chore
        - docs
