name: 'Auto Labels'
description: 'Automatically manage labels on pull requests and issues based on configurable matchers (title, body, comments, commits, branch, files, author), with optional status checks.'
author: 'cest-la-v'
branding:
  icon: tag
  color: yellow

inputs:
  config-path:
    description: 'The path for the label configurations'
    default: '.github/labels.yml'
    required: false
  config-repo:
    description: 'The repository for the label configurations'
    default: ${{ github.repository }}
    required: false

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: '.bun-version'

    - name: Run action
      shell: bash
      run: bun ${{ github.action_path }}/dist/index.js
