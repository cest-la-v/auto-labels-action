# `dist/index.js` is the bundled entrypoint for the action (built from src/).
# We need to make sure the checked-in `dist/` actually matches what we expect it to be.
name: Check Dist

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild dist/
        run: bun run build

      - name: Compare the expected and actual dist/ directories
        id: diff
        run: |
          if ! git diff --quiet dist/; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --stat
            exit 1
          fi
