name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - run: bun install --frozen-lockfile
      - run: bun run package

      - run: git diff --exit-code || (echo "::error ::dist/ is out of date — run bun run package and commit" && exit 1)

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - run: bun install --frozen-lockfile
      - run: bun test

  lint_prettier:
    name: Lint [prettier]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - run: bun install --frozen-lockfile
      - run: bunx prettier --check .

  lint_eslint:
    name: Lint [eslint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - run: bun install --frozen-lockfile
      - run: bunx eslint src/**/*.ts
