version: v1

labels:
  - label: 'feat'
    include:
      mode: 'ANY'
      title: '^feat:.*'
      branch: '^feat/.*'
      commits: '^feat:.*'

  - label: dependabot
    include:
      mode: 'ANY'
      title: '^chore(deps).*'
      branch: '^dependabot/.*'
      commits: '^chore(deps).*'

  - label: 'fix'
    include:
      mode: 'ANY'
      title: '^fix:.*'
      branch: '^fix/.*'
      commits: '^fix:.*'

  - label: 'chore'
    include:
      mode: 'ANY'
      title: "^chore(\\((deps|ci)\\))?:.*"
      branch: '^chore/.*'
      commits: "^chore(\\((deps|ci)\\))?:.*"

  - label: 'chore'
    include:
      title: "^bump(\\((deps|ci)\\))?:.*"

  - label: 'docs'
    include:
      mode: 'ANY'
      title: '^docs:.*'
      branch: '^docs/.*'
      commits: '^docs:.*'

  - label: 'test:labeler'
    removeOnMismatch: true
    include:
      files: '.github/labels.yml'

  - label: 'test:dist'
    removeOnMismatch: true
    include:
      files: ['dist/*']

  - label: 'test:tests'
    removeOnMismatch: true
    include:
      files: ['__tests__/matcher/**', '__tests__/*.ts']

  - label: 'test:body'
    include:
      body: "(\\n|.)*- \\[x\\] test(\\n|.)*"

  - label: 'test:comment'
    include:
      comment: "# \\[Codecov\\] .*"

  - label: 'test:stale'
    include:
      comment: '/stale'

  - label: 'test: s'
    removeOnMismatch: true
    include:
      files:
        count:
          gte: 1
          lte: 4

  - label: 'test: m'
    removeOnMismatch: true
    include:
      files:
        count:
          gte: 5
          lte: 10

  - label: 'test: l'
    removeOnMismatch: true
    include:
      files:
        count:
          gte: 11

  - label: 'Maintainer'
    include:
      author:
        - cest-la-v

  - label: 'Owner'
    include:
      author: cest-la-v

  - label: 'branch: main'
    include:
      baseBranch: main

  - label: 'branch: release'
    include:
      baseBranch: '^release/.*'

checks:
  - context: 'Semantic Pull Request'
    url: 'https://github.com/cest-la-v/auto-labels-action/blob/main/.github/labels.yml'
    description:
      success: Ready for review & merge.
      failure: Missing semantic label for merge.
    labels:
      any:
        - feat
        - fix
        - chore
        - docs

  - context: 'Do Not Merge'
    url: 'https://github.com/cest-la-v/auto-labels-action/blob/main/.github/labels.yml'
    description: "Disable merging when 'DO NOT MERGE' label is set"
    labels:
      none:
        - 'DO NOT MERGE'
